pre-commit:
  jobs:
    - run: bunx ultracite fix {staged_files}
      glob:
        - '*.js'
        - '*.jsx'
        - '*.ts'
        - '*.tsx'
        - '*.json'
        - '*.jsonc'
        - '*.css'
        - '**/*.js'
        - '**/*.jsx'
        - '**/*.ts'
        - '**/*.tsx'
        - '**/*.json'
        - '**/*.jsonc'
        - '**/*.css'
      stage_fixed: true
