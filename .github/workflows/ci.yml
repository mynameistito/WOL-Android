name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Lint
        run: bun run check
      - name: Test
        run: bun run test

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - uses: actions/setup-java@c5195efecf7bdfc987ee0bae72271e28d5e2365c # v4.2.2
        with:
          distribution: "temurin"
          java-version: "17"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: bun install --frozen-lockfile
      - name: Android Build
        run: chmod +x android/gradlew && cd android && ./gradlew assembleDebug --no-daemon
